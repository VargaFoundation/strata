# 3-node Ecphoria Raft cluster with Ollama for embeddings.
# Usage: docker compose -f deploy/docker-compose.cluster.yml up -d

services:
  ecphoria-1:
    build:
      context: ..
      dockerfile: Dockerfile
    hostname: ecphoria-1
    ports:
      - "8432:8432"
      - "5432:5432"
    environment:
      ECPHORIA_CLUSTER__ENABLED: "true"
      ECPHORIA_CLUSTER__NODE_ID: "1"
      # Local DEMO cluster: explicitly unauthenticated (containers must bind 0.0.0.0).
      # Do NOT reuse this file for anything network-reachable — set
      # ECPHORIA_GATEWAY__AUTH_ENABLED=true + ECPHORIA_GATEWAY__API_KEYS instead.
      ECPHORIA_GATEWAY__ALLOW_INSECURE: "true"
      ECPHORIA_CLUSTER__LISTEN: "0.0.0.0:9433"
      # Full voter membership as id@addr, INCLUDING this node (lowest id bootstraps).
      ECPHORIA_CLUSTER__PEERS: "1@http://ecphoria-1:9433,2@http://ecphoria-2:9433,3@http://ecphoria-3:9433"
      ECPHORIA_CLUSTER__DATA_DIR: "/data/raft"
      ECPHORIA_STORAGE__DATA_DIR: "/data"
      ECPHORIA_EMBEDDING__PROVIDER: ollama
      ECPHORIA_EMBEDDING__OLLAMA_URL: http://ollama:11434
    volumes:
      - ecphoria-1-data:/data
    depends_on:
      - ollama

  ecphoria-2:
    build:
      context: ..
      dockerfile: Dockerfile
    hostname: ecphoria-2
    ports:
      - "8433:8432"
    environment:
      ECPHORIA_CLUSTER__ENABLED: "true"
      ECPHORIA_CLUSTER__NODE_ID: "2"
      # Local DEMO cluster: explicitly unauthenticated (containers must bind 0.0.0.0).
      # Do NOT reuse this file for anything network-reachable — set
      # ECPHORIA_GATEWAY__AUTH_ENABLED=true + ECPHORIA_GATEWAY__API_KEYS instead.
      ECPHORIA_GATEWAY__ALLOW_INSECURE: "true"
      ECPHORIA_CLUSTER__LISTEN: "0.0.0.0:9433"
      ECPHORIA_CLUSTER__PEERS: "1@http://ecphoria-1:9433,2@http://ecphoria-2:9433,3@http://ecphoria-3:9433"
      ECPHORIA_CLUSTER__DATA_DIR: "/data/raft"
      ECPHORIA_STORAGE__DATA_DIR: "/data"
      ECPHORIA_EMBEDDING__PROVIDER: ollama
      ECPHORIA_EMBEDDING__OLLAMA_URL: http://ollama:11434
    volumes:
      - ecphoria-2-data:/data
    depends_on:
      - ollama

  ecphoria-3:
    build:
      context: ..
      dockerfile: Dockerfile
    hostname: ecphoria-3
    ports:
      - "8434:8432"
    environment:
      ECPHORIA_CLUSTER__ENABLED: "true"
      ECPHORIA_CLUSTER__NODE_ID: "3"
      # Local DEMO cluster: explicitly unauthenticated (containers must bind 0.0.0.0).
      # Do NOT reuse this file for anything network-reachable — set
      # ECPHORIA_GATEWAY__AUTH_ENABLED=true + ECPHORIA_GATEWAY__API_KEYS instead.
      ECPHORIA_GATEWAY__ALLOW_INSECURE: "true"
      ECPHORIA_CLUSTER__LISTEN: "0.0.0.0:9433"
      ECPHORIA_CLUSTER__PEERS: "1@http://ecphoria-1:9433,2@http://ecphoria-2:9433,3@http://ecphoria-3:9433"
      ECPHORIA_CLUSTER__DATA_DIR: "/data/raft"
      ECPHORIA_STORAGE__DATA_DIR: "/data"
      ECPHORIA_EMBEDDING__PROVIDER: ollama
      ECPHORIA_EMBEDDING__OLLAMA_URL: http://ollama:11434
    volumes:
      - ecphoria-3-data:/data
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ecphoria-1-data:
  ecphoria-2-data:
  ecphoria-3-data:
  ollama-data:
