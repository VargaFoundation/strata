{{- if .Values.sharding.enabled }}
{{- $root := . }}
{{- range $shard := until (int .Values.sharding.shards) }}
---
# Shard {{ $shard }} — an independent Raft group (own leader) for horizontal write scaling.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ecphoria.fullname" $root }}-shard-{{ $shard }}
  labels:
    {{- include "ecphoria.labels" $root | nindent 4 }}
    ecphoria.io/shard: "{{ $shard }}"
spec:
  serviceName: {{ include "ecphoria.fullname" $root }}-shard-{{ $shard }}-headless
  replicas: {{ $root.Values.sharding.replicasPerShard }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "ecphoria.selectorLabels" $root | nindent 6 }}
      ecphoria.io/shard: "{{ $shard }}"
  template:
    metadata:
      labels:
        {{- include "ecphoria.selectorLabels" $root | nindent 8 }}
        ecphoria.io/shard: "{{ $shard }}"
      {{- with $root.Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        {{- toYaml $root.Values.podSecurityContext | nindent 8 }}
      {{- with $root.Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $root.Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ecphoria
          image: "{{ $root.Values.image.repository }}:{{ $root.Values.image.tag }}"
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          securityContext:
            {{- toYaml $root.Values.securityContext | nindent 12 }}
          ports:
            - { name: http, containerPort: 8432, protocol: TCP }
            - { name: pg, containerPort: 5432, protocol: TCP }
            - { name: grpc, containerPort: 9432, protocol: TCP }
            - { name: raft, containerPort: 9433, protocol: TCP }
          env:
            - name: ECPHORIA_STORAGE__DATA_DIR
              value: {{ $root.Values.config.storage.dataDir | quote }}
            - name: ECPHORIA_MEMORY__EPISODIC__DB_PATH
              value: {{ $root.Values.config.memory.episodic.dbPath | quote }}
            - name: ECPHORIA_MEMORY__SEMANTIC__INDEX_DIR
              value: {{ $root.Values.config.memory.semantic.indexDir | quote }}
            - name: ECPHORIA_MEMORY__STATE__DB_PATH
              value: {{ $root.Values.config.memory.state.dbPath | quote }}
            - name: ECPHORIA_GATEWAY__AUTH_ENABLED
              value: {{ $root.Values.config.gateway.authEnabled | quote }}
            {{- if $root.Values.config.gateway.apiKeys }}
            # Prefer sha256:<hex>@tenant:role entries so no plaintext secret sits in values/env.
            - name: ECPHORIA_GATEWAY__API_KEYS
              value: {{ join "," $root.Values.config.gateway.apiKeys | quote }}
            {{- end }}
            {{- if $root.Values.config.gateway.allowInsecure }}
            # Explicit opt-out of the secure-by-default guard (trusted/isolated networks only).
            - name: ECPHORIA_GATEWAY__ALLOW_INSECURE
              value: "true"
            {{- end }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ECPHORIA_CLUSTER__ENABLED
              value: "true"
            # The shard count is uniform across the fleet so every node hashes keys identically.
            - name: ECPHORIA_CLUSTER__SHARDS
              value: "{{ $root.Values.sharding.shards }}"
            # This pod's shard, and the HTTP base URL of every shard (for cross-shard request routing).
            - name: ECPHORIA_CLUSTER__SHARD_INDEX
              value: "{{ $shard }}"
            - name: ECPHORIA_CLUSTER__SHARD_BASE_URLS
              value: "{{- range $i := until (int $root.Values.sharding.shards) }}{{ if $i }},{{ end }}http://{{ include "ecphoria.fullname" $root }}-shard-{{ $i }}-headless.{{ $root.Release.Namespace }}.svc.cluster.local:8432{{- end }}"
            - name: ECPHORIA_EMBEDDING__PROVIDER
              value: {{ $root.Values.config.embedding.provider | quote }}
            - name: ECPHORIA_EMBEDDING__MODEL
              value: {{ $root.Values.config.embedding.model | quote }}
            - name: ECPHORIA_EMBEDDING__OLLAMA_URL
              value: {{ $root.Values.config.embedding.ollamaUrl | quote }}
          command:
            - /bin/sh
            - -c
            - |
              # node_id from the pod ordinal; peers scoped to THIS shard's StatefulSet only.
              ORDINAL=$(echo $POD_NAME | rev | cut -d'-' -f1 | rev)
              export ECPHORIA_CLUSTER__NODE_ID=$((ORDINAL + 1))
              PEERS=""
              for i in $(seq 0 $(({{ $root.Values.sharding.replicasPerShard }} - 1))); do
                PID=$((i + 1))
                ADDR="http://{{ include "ecphoria.fullname" $root }}-shard-{{ $shard }}-${i}.{{ include "ecphoria.fullname" $root }}-shard-{{ $shard }}-headless.{{ $root.Release.Namespace }}.svc.cluster.local:9433"
                if [ -z "$PEERS" ]; then PEERS="${PID}@${ADDR}"; else PEERS="$PEERS,${PID}@${ADDR}"; fi
              done
              export ECPHORIA_CLUSTER__PEERS=$PEERS
              export ECPHORIA_CLUSTER__LISTEN="0.0.0.0:9433"
              exec ecphoria-server
          {{- with $root.Values.probes.liveness }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $root.Values.probes.readiness }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml $root.Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
  {{- if $root.Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: {{ $root.Values.persistence.accessModes | toJson }}
        {{- if $root.Values.persistence.storageClass }}
        storageClassName: {{ $root.Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ $root.Values.persistence.size }}
  {{- end }}
{{- end }}
{{- end }}
