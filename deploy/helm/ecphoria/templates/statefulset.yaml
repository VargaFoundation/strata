{{- if not .Values.sharding.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ecphoria.fullname" . }}
  labels:
    {{- include "ecphoria.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "ecphoria.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "ecphoria.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ecphoria.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ecphoria
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8432
              protocol: TCP
            - name: pg
              containerPort: 5432
              protocol: TCP
            - name: grpc
              containerPort: 9432
              protocol: TCP
            - name: raft
              containerPort: 9433
              protocol: TCP
          env:
            # Storage
            - name: ECPHORIA_STORAGE__DATA_DIR
              value: {{ .Values.config.storage.dataDir | quote }}
            - name: ECPHORIA_STORAGE__ENGINE
              value: {{ .Values.config.storage.engine | quote }}
            # Episodic
            - name: ECPHORIA_MEMORY__EPISODIC__DB_PATH
              value: {{ .Values.config.memory.episodic.dbPath | quote }}
            # Semantic
            - name: ECPHORIA_MEMORY__SEMANTIC__INDEX_DIR
              value: {{ .Values.config.memory.semantic.indexDir | quote }}
            - name: ECPHORIA_MEMORY__SEMANTIC__DEFAULT_DIMENSION
              value: {{ .Values.config.memory.semantic.defaultDimension | quote }}
            # State
            - name: ECPHORIA_MEMORY__STATE__DB_PATH
              value: {{ .Values.config.memory.state.dbPath | quote }}
            # Gateway
            - name: ECPHORIA_GATEWAY__LISTEN
              value: {{ .Values.config.gateway.listen | quote }}
            - name: ECPHORIA_GATEWAY__PG_LISTEN
              value: {{ .Values.config.gateway.pgListen | quote }}
            - name: ECPHORIA_GATEWAY__GRPC_LISTEN
              value: {{ .Values.config.gateway.grpcListen | quote }}
            - name: ECPHORIA_GATEWAY__MCP_ENABLED
              value: {{ .Values.config.gateway.mcpEnabled | quote }}
            - name: ECPHORIA_GATEWAY__LLM_PROXY_ENABLED
              value: {{ .Values.config.gateway.llmProxyEnabled | quote }}
            - name: ECPHORIA_GATEWAY__AUTH_ENABLED
              value: {{ .Values.config.gateway.authEnabled | quote }}
            {{- if .Values.config.gateway.apiKeys }}
            # Prefer sha256:<hex>@tenant:role entries so no plaintext secret sits in values/env.
            - name: ECPHORIA_GATEWAY__API_KEYS
              value: {{ join "," .Values.config.gateway.apiKeys | quote }}
            {{- end }}
            {{- if .Values.config.gateway.allowInsecure }}
            # Explicit opt-out of the secure-by-default guard (trusted/isolated networks only).
            - name: ECPHORIA_GATEWAY__ALLOW_INSECURE
              value: "true"
            {{- end }}
            {{- if gt (int .Values.config.gateway.maxPgConnections) 0 }}
            - name: ECPHORIA_GATEWAY__MAX_PG_CONNECTIONS
              value: {{ .Values.config.gateway.maxPgConnections | quote }}
            {{- end }}
            {{- if .Values.config.gateway.corsOrigins }}
            - name: ECPHORIA_GATEWAY__CORS_ORIGINS
              value: {{ join "," .Values.config.gateway.corsOrigins | quote }}
            {{- end }}
            {{- if gt (int .Values.config.gateway.rateLimitPerKey) 0 }}
            - name: ECPHORIA_GATEWAY__RATE_LIMIT_PER_KEY
              value: {{ .Values.config.gateway.rateLimitPerKey | quote }}
            {{- end }}
            {{- if .Values.config.gateway.auditDbPath }}
            - name: ECPHORIA_GATEWAY__AUDIT_DB_PATH
              value: {{ .Values.config.gateway.auditDbPath | quote }}
            {{- end }}
            {{- if .Values.config.gateway.requireTenant }}
            - name: ECPHORIA_GATEWAY__REQUIRE_TENANT
              value: "true"
            {{- end }}
            {{- if .Values.config.gateway.webhookRequireSignature }}
            - name: ECPHORIA_GATEWAY__WEBHOOK_REQUIRE_SIGNATURE
              value: "true"
            {{- end }}
            {{- if .Values.config.gateway.webhookSecrets }}
            - name: ECPHORIA_GATEWAY__WEBHOOK_SECRETS
              value: {{ join "," .Values.config.gateway.webhookSecrets | quote }}
            {{- end }}
            {{- if .Values.config.gateway.llmCacheSimilarity }}
            - name: ECPHORIA_GATEWAY__LLM_CACHE_SIMILARITY
              value: "true"
            {{- end }}
            {{- if .Values.config.gateway.toolGatewayAllowPrivateNetworks }}
            - name: ECPHORIA_GATEWAY__TOOL_GATEWAY_ALLOW_PRIVATE_NETWORKS
              value: "true"
            {{- end }}
            {{- if .Values.config.gateway.cdcSinkUrl }}
            - name: ECPHORIA_GATEWAY__CDC_SINK_URL
              value: {{ .Values.config.gateway.cdcSinkUrl | quote }}
            {{- end }}
            {{- if .Values.config.gateway.publishEnabled }}
            - name: ECPHORIA_GATEWAY__PUBLISH_ENABLED
              value: "true"
            - name: ECPHORIA_GATEWAY__PUBLISH_TENANT
              value: {{ .Values.config.gateway.publishTenant | default "default" | quote }}
            {{- end }}
            {{- if .Values.config.gateway.jwtSecretExistingSecret }}
            - name: ECPHORIA_GATEWAY__JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.gateway.jwtSecretExistingSecret | quote }}
                  key: jwt-secret
            {{- else if .Values.config.gateway.jwtSecret }}
            - name: ECPHORIA_GATEWAY__JWT_SECRET
              value: {{ .Values.config.gateway.jwtSecret | quote }}
            {{- end }}
            {{- if .Values.config.gateway.oidc.enabled }}
            - name: ECPHORIA_GATEWAY__OIDC__ENABLED
              value: "true"
            - name: ECPHORIA_GATEWAY__OIDC__ISSUER_URL
              value: {{ .Values.config.gateway.oidc.issuerUrl | quote }}
            - name: ECPHORIA_GATEWAY__OIDC__JWKS_URI
              value: {{ .Values.config.gateway.oidc.jwksUri | quote }}
            - name: ECPHORIA_GATEWAY__OIDC__AUDIENCE
              value: {{ .Values.config.gateway.oidc.audience | quote }}
            - name: ECPHORIA_GATEWAY__OIDC__ROLE_CLAIM
              value: {{ .Values.config.gateway.oidc.roleClaim | quote }}
            {{- end }}
            # Cluster — auto-assign node_id from StatefulSet ordinal
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ECPHORIA_CLUSTER__ENABLED
              value: {{ .Values.config.cluster.enabled | quote }}
            # Embedding
            - name: ECPHORIA_EMBEDDING__PROVIDER
              value: {{ .Values.config.embedding.provider | quote }}
            - name: ECPHORIA_EMBEDDING__MODEL
              value: {{ .Values.config.embedding.model | quote }}
            - name: ECPHORIA_EMBEDDING__OLLAMA_URL
              value: {{ .Values.config.embedding.ollamaUrl | quote }}
          # Init script to derive node_id and peers from StatefulSet
          command:
            - /bin/sh
            - -c
            - |
              # Extract ordinal from pod name (e.g., ecphoria-0 -> 1, ecphoria-1 -> 2)
              ORDINAL=$(echo $POD_NAME | rev | cut -d'-' -f1 | rev)
              NODE_ID=$((ORDINAL + 1))
              export ECPHORIA_CLUSTER__NODE_ID=$NODE_ID

              # Build the FULL voter membership (including self) from StatefulSet DNS, as the
              # `id@http://addr` form the coordinator parses to form/join the cluster.
              # The lowest-id node (ecphoria-0 -> id 1) bootstraps; the rest are pulled in by the leader.
              PEERS=""
              for i in $(seq 0 $(({{ .Values.replicaCount }} - 1))); do
                PID=$((i + 1))
                ADDR="http://{{ include "ecphoria.fullname" . }}-${i}.{{ include "ecphoria.fullname" . }}-headless.{{ .Release.Namespace }}.svc.cluster.local:9433"
                ENTRY="${PID}@${ADDR}"
                if [ -z "$PEERS" ]; then
                  PEERS="$ENTRY"
                else
                  PEERS="$PEERS,$ENTRY"
                fi
              done
              export ECPHORIA_CLUSTER__PEERS=$PEERS
              export ECPHORIA_CLUSTER__LISTEN="0.0.0.0:9433"

              exec ecphoria-server
          {{- with .Values.probes.liveness }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.probes.readiness }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: {{ .Values.persistence.accessModes | toJson }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
{{- end }}
