{{- if not .Values.sharding.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "strata.fullname" . }}
  labels:
    {{- include "strata.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "strata.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "strata.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "strata.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: strata
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8432
              protocol: TCP
            - name: pg
              containerPort: 5432
              protocol: TCP
            - name: grpc
              containerPort: 9432
              protocol: TCP
            - name: raft
              containerPort: 9433
              protocol: TCP
          env:
            # Storage
            - name: STRATA_STORAGE__DATA_DIR
              value: {{ .Values.config.storage.dataDir | quote }}
            - name: STRATA_STORAGE__ENGINE
              value: {{ .Values.config.storage.engine | quote }}
            # Episodic
            - name: STRATA_MEMORY__EPISODIC__DB_PATH
              value: {{ .Values.config.memory.episodic.dbPath | quote }}
            # Semantic
            - name: STRATA_MEMORY__SEMANTIC__INDEX_DIR
              value: {{ .Values.config.memory.semantic.indexDir | quote }}
            - name: STRATA_MEMORY__SEMANTIC__DEFAULT_DIMENSION
              value: {{ .Values.config.memory.semantic.defaultDimension | quote }}
            # State
            - name: STRATA_MEMORY__STATE__DB_PATH
              value: {{ .Values.config.memory.state.dbPath | quote }}
            # Gateway
            - name: STRATA_GATEWAY__LISTEN
              value: {{ .Values.config.gateway.listen | quote }}
            - name: STRATA_GATEWAY__PG_LISTEN
              value: {{ .Values.config.gateway.pgListen | quote }}
            - name: STRATA_GATEWAY__GRPC_LISTEN
              value: {{ .Values.config.gateway.grpcListen | quote }}
            - name: STRATA_GATEWAY__MCP_ENABLED
              value: {{ .Values.config.gateway.mcpEnabled | quote }}
            - name: STRATA_GATEWAY__AUTH_ENABLED
              value: {{ .Values.config.gateway.authEnabled | quote }}
            {{- if .Values.config.gateway.apiKeys }}
            # Prefer sha256:<hex>@tenant:role entries so no plaintext secret sits in values/env.
            - name: STRATA_GATEWAY__API_KEYS
              value: {{ join "," .Values.config.gateway.apiKeys | quote }}
            {{- end }}
            {{- if .Values.config.gateway.allowInsecure }}
            # Explicit opt-out of the secure-by-default guard (trusted/isolated networks only).
            - name: STRATA_GATEWAY__ALLOW_INSECURE
              value: "true"
            {{- end }}
            # Cluster — auto-assign node_id from StatefulSet ordinal
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: STRATA_CLUSTER__ENABLED
              value: {{ .Values.config.cluster.enabled | quote }}
            # Embedding
            - name: STRATA_EMBEDDING__PROVIDER
              value: {{ .Values.config.embedding.provider | quote }}
            - name: STRATA_EMBEDDING__MODEL
              value: {{ .Values.config.embedding.model | quote }}
            - name: STRATA_EMBEDDING__OLLAMA_URL
              value: {{ .Values.config.embedding.ollamaUrl | quote }}
          # Init script to derive node_id and peers from StatefulSet
          command:
            - /bin/sh
            - -c
            - |
              # Extract ordinal from pod name (e.g., strata-0 -> 1, strata-1 -> 2)
              ORDINAL=$(echo $POD_NAME | rev | cut -d'-' -f1 | rev)
              NODE_ID=$((ORDINAL + 1))
              export STRATA_CLUSTER__NODE_ID=$NODE_ID

              # Build the FULL voter membership (including self) from StatefulSet DNS, as the
              # `id@http://addr` form the coordinator parses to form/join the cluster.
              # The lowest-id node (strata-0 -> id 1) bootstraps; the rest are pulled in by the leader.
              PEERS=""
              for i in $(seq 0 $(({{ .Values.replicaCount }} - 1))); do
                PID=$((i + 1))
                ADDR="http://{{ include "strata.fullname" . }}-${i}.{{ include "strata.fullname" . }}-headless.{{ .Release.Namespace }}.svc.cluster.local:9433"
                ENTRY="${PID}@${ADDR}"
                if [ -z "$PEERS" ]; then
                  PEERS="$ENTRY"
                else
                  PEERS="$PEERS,$ENTRY"
                fi
              done
              export STRATA_CLUSTER__PEERS=$PEERS
              export STRATA_CLUSTER__LISTEN="0.0.0.0:9433"

              exec strata-server
          {{- with .Values.probes.liveness }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.probes.readiness }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: {{ .Values.persistence.accessModes | toJson }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
{{- end }}
