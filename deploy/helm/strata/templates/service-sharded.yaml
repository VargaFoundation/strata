{{- if .Values.sharding.enabled }}
{{- $root := . }}
{{- range $shard := until (int .Values.sharding.shards) }}
---
# Per-shard headless service for intra-shard Raft peer discovery (one Raft group per shard).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "strata.fullname" $root }}-shard-{{ $shard }}-headless
  labels:
    {{- include "strata.labels" $root | nindent 4 }}
    strata.io/shard: "{{ $shard }}"
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "strata.selectorLabels" $root | nindent 4 }}
    strata.io/shard: "{{ $shard }}"
  ports:
    - name: raft
      port: {{ $root.Values.service.raftPort }}
      targetPort: raft
    - name: http
      port: {{ $root.Values.service.httpPort }}
      targetPort: http
{{- end }}
{{- end }}
