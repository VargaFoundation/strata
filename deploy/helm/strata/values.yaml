# Default values for Strata Helm chart.

replicaCount: 3

# -- Pod annotations. Use this to trigger rolling restarts on cert/secret rotation, e.g. with
# Stakater Reloader: `reloader.stakater.com/auto: "true"` (cert-manager renews the TLS Secret →
# Reloader restarts the pods → tonic rebuilds its TLS config with the new cert). tonic builds TLS
# once at startup, so cert rotation is a rolling-restart concern, not in-process hot reload.
podAnnotations: {}

# -- Write sharding: deploy N independent Raft groups (StatefulSets), each its own cluster, for
# horizontal write scaling. Disabled by default (single group = `replicaCount` nodes). When enabled,
# each shard is `<fullname>-shard-<i>` with `replicasPerShard` nodes + its own headless service.
sharding:
  enabled: false
  shards: 2
  replicasPerShard: 3

image:
  repository: ghcr.io/vargafoundation/strata
  tag: latest
  pullPolicy: IfNotPresent

# -- Strata server configuration (maps to strata.toml / env vars)
config:
  storage:
    dataDir: /data
    engine: local
  memory:
    episodic:
      dbPath: /data/episodic.duckdb
    semantic:
      indexDir: /data/vectors
      defaultDimension: 768
    state:
      dbPath: /data/state.db
  gateway:
    listen: "0.0.0.0:8432"
    pgListen: "0.0.0.0:5432"
    grpcListen: "0.0.0.0:9432"
    mcpEnabled: true
    llmProxyEnabled: false
    # Secure by default: with authEnabled=false the pods bind 0.0.0.0 and the server REFUSES to
    # start unless allowInsecure=true. Set authEnabled=true and provide apiKeys (recommended:
    # hashed entries "sha256:<64-hex-of-secret>@tenant:role" — generate with
    # `KEY=$(openssl rand -hex 32); echo -n "$KEY" | sha256sum`), or accept the risk explicitly.
    authEnabled: true
    apiKeys: []
    allowInsecure: false
  cluster:
    enabled: true
    # nodeId is auto-assigned from StatefulSet ordinal
  embedding:
    provider: ollama
    model: nomic-embed-text
    dimension: 768
    ollamaUrl: "http://ollama:11434"

# -- Service configuration
service:
  type: ClusterIP
  httpPort: 8432
  pgPort: 5432
  grpcPort: 9432
  raftPort: 9433

# -- Headless service for StatefulSet peer discovery
headlessService:
  enabled: true

# -- Ingress for the HTTP API + admin UI (/ui). Point a host at the http service port.
ingress:
  enabled: false
  className: ""
  annotations: {}
  # e.g. nginx: nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
  hosts:
    - host: strata.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: strata-tls
  #    hosts: [strata.local]

# -- Horizontal Pod Autoscaler. NOTE: Strata nodes form a Raft group — changing the pod count changes
# cluster membership, which the HPA does NOT coordinate. Prefer the operator (ops/operator) for
# cluster-aware scaling; use HPA only for a single-node (replicaCount: 1) or membership-stable setup.
autoscaling:
  enabled: false
  minReplicas: 3
  maxReplicas: 9
  targetCPUUtilizationPercentage: 75
  # 0 disables the memory metric.
  targetMemoryUtilizationPercentage: 0

# -- Persistent volume for data
persistence:
  enabled: true
  # Encryption at rest = use an ENCRYPTED StorageClass here (the on-disk stores are plaintext; volume
  # encryption is the supported mechanism — see docs/security.md#encryption-at-rest). e.g. an
  # ebs.csi.aws.com class with encrypted:"true" + kmsKeyId, or a GKE pd.csi CMEK class. "" = cluster default.
  storageClass: ""
  size: 10Gi
  accessModes:
    - ReadWriteOnce

# -- Resource requests and limits
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 4Gi

# -- Pod-level security context. runAsNonRoot matches the image (uid 1000); fsGroup makes the PVC
# group-writable; seccomp RuntimeDefault.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context: drop all capabilities and block privilege escalation.
# readOnlyRootFilesystem is left false by default — enable it once all writes are confined to
# mounted volumes (data -> PVC) and a writable emptyDir is provided for /tmp (snapshot staging).
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

# -- Liveness and readiness probes
probes:
  liveness:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 15
  readiness:
    httpGet:
      # /ready returns 503 when the node has no Raft leader or a subsystem is down, so a
      # not-yet-ready pod is kept out of the Service (unlike /health, which is always 200).
      path: /ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5

# -- Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# -- Service monitor for Prometheus
serviceMonitor:
  enabled: false
  interval: 15s
  path: /metrics

# -- PrometheusRule with alerts (no-leader, embedding failures, replication lag, leader flapping,
# p99 latency, agent-run failures). Requires the Prometheus Operator CRDs.
prometheusRule:
  enabled: false
  # Extra labels so your Prometheus Operator's ruleSelector picks it up, e.g. { release: kube-prometheus-stack }.
  labels: {}

# -- NetworkPolicy: lock the PG wire (:5432), gRPC (:9432) and Raft (:9433) ports to intra-fleet
# pod-to-pod traffic (never expose them publicly). The HTTP API (:8432) accepts ingress per
# `httpFrom` (empty = from anywhere). Requires a CNI that enforces NetworkPolicy.
networkPolicy:
  enabled: false
  # Ingress sources allowed to reach the HTTP API (:8432). Empty = allow from anywhere. Example:
  # httpFrom:
  #   - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: ingress-nginx } }
  httpFrom: []

# -- Node affinity / tolerations
nodeSelector: {}
tolerations: []
affinity: {}

# -- Ollama sidecar (optional, for local embeddings)
ollama:
  enabled: false
  image: ollama/ollama:latest
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
