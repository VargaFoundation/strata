# ServiceAccount + least-privilege ClusterRole for the operator. It watches StrataShardPlan across
# namespaces (Api::all) and creates/patches/deletes shard StatefulSets, so the role is cluster-scoped.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: strata-operator
  namespace: strata-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: strata-operator
rules:
  # The custom resource it reconciles (+ its status subresource).
  - apiGroups: ["strata.io"]
    resources: ["stratashardplans", "stratashardplans/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  # Shard StatefulSets it clones on scale-up and deletes on scale-down.
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Read the admin-token Secret referenced by a plan's admin_token_secret.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  # Leader-election Lease (so >1 replica is safe).
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
  # Emitting events for reconcile outcomes (best-effort).
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: strata-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: strata-operator
subjects:
  - kind: ServiceAccount
    name: strata-operator
    namespace: strata-system
