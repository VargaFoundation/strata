apiVersion: 1

datasources:
  - name: Ecphoria
    type: postgres
    uid: ecphoria-pg
    url: ecphoria:5432
    database: ecphoria
    user: postgres
    jsonData:
      sslmode: disable
      postgresVersion: 1500
    isDefault: true

  - name: Prometheus
    type: prometheus
    uid: ecphoria-prom
    url: http://prometheus:9090
    isDefault: false
