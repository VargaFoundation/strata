name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: Mozilla-Actions/sccache-action@v0.0.6
      - run: cargo clippy --workspace --all-targets -- -D warnings
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: Mozilla-Actions/sccache-action@v0.0.6
      - run: cargo test --workspace
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

  audit:
    name: Security audit (RUSTSEC advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Scans the dependency tree for known vulnerabilities (RUSTSEC database).
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  go-sdk:
    name: Go SDK (build + vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      # Compile-verify the Go client (no local Go toolchain in the dev env, so CI is the gate).
      - run: go build ./...
        working-directory: sdk/go
      - run: go vet ./...
        working-directory: sdk/go

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: Mozilla-Actions/sccache-action@v0.0.6
      - run: cargo build --release --workspace
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
      - uses: actions/upload-artifact@v4
        with:
          name: strata-server
          path: target/release/strata-server
