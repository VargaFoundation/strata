name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

# Least privilege: the GITHUB_TOKEN is read-only for every job by default; a job that needs more
# opts in explicitly (see `audit`).
permissions:
  contents: read

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: Mozilla-Actions/sccache-action@v0.0.6
      - run: cargo clippy --workspace --all-targets -- -D warnings
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

  features-local:
    name: Local ONNX backends (compile guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # embed-local/rerank-local pull fastembed → ort, which downloads a native onnxruntime binary at
      # build time (needs network — not buildable in an offline sandbox). Compile-check them here so
      # the feature-gated code can't rot. `cargo check` is enough to type-check against fastembed.
      - run: cargo check -p ecphoria-core --features embed-local,rerank-local

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: Mozilla-Actions/sccache-action@v0.0.6
      - run: cargo test --workspace
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
      # Guard the optional `otlp` feature (not in the default build) — run its mock-collector export
      # test so the exporter wiring can't rot. (The `embed-local`/`rerank-local` backends download a
      # native onnxruntime binary at build time; they're compile-guarded in the dedicated job below.)
      - run: cargo test -p ecphoria-server --features otlp telemetry
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"

  audit:
    name: Security audit (RUSTSEC advisories)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write # audit-check posts a check-run with the advisory results
    steps:
      - uses: actions/checkout@v4
      # Scans the dependency tree for known vulnerabilities (RUSTSEC database).
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  go-sdk:
    name: Go SDK (build + vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      # Compile-verify the Go client (no local Go toolchain in the dev env, so CI is the gate).
      - run: go build ./...
        working-directory: sdk/go
      - run: go vet ./...
        working-directory: sdk/go

  python-sdk:
    name: Python SDK (build + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install + test
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade pip build
          pip install -e ".[dev]"
          python -m build      # sdist + wheel must build
          python -m pytest -q  # unit tests (offline; no server required)

  python-binding:
    name: Python binding (pyo3 build + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Build the embedded engine as a native Python extension (maturin) and run the smoke test —
      # the no-server, in-process API. abi3 wheel, so it's portable across CPython ≥ 3.9.
      - name: Build + smoke
        working-directory: bindings/python
        run: |
          python -m pip install --upgrade pip maturin pytest
          maturin build --release --out dist
          pip install --no-index --find-links dist ecphoria
          python -m pytest -q

  typescript-sdk:
    name: TypeScript SDK (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install + build
        working-directory: sdk/typescript
        run: |
          npm ci || npm install
          npm run build
          npm test --if-present

  operator:
    name: Operator (fmt + clippy + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # The operator is a standalone crate (own [workspace] table) — `cargo --workspace` above does
      # NOT cover it, so it gets its own gate. (cmake is preinstalled on the runner for aws-lc-sys.)
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ops/operator
      - run: cargo fmt --check
        working-directory: ops/operator
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: ops/operator
      - run: cargo build --release
        working-directory: ops/operator

  helm:
    name: Helm lint + template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v5
      - run: helm lint deploy/helm/ecphoria
      # Render with defaults, and with the optional features on, to catch template errors.
      - run: helm template ecphoria deploy/helm/ecphoria >/dev/null
      - run: >-
          helm template ecphoria deploy/helm/ecphoria
          --set ingress.enabled=true --set autoscaling.enabled=true
          --set serviceMonitor.enabled=true --set prometheusRule.enabled=true
          --set sharding.enabled=true >/dev/null

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: Mozilla-Actions/sccache-action@v0.0.6
      - run: cargo build --release --workspace
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
      - uses: actions/upload-artifact@v4
        with:
          name: ecphoria-server
          path: target/release/ecphoria-server

  cluster-ha:
    name: Cluster HA (real 3-node failover)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ecphoria-server
          path: target/release
      - run: chmod +x target/release/ecphoria-server ops/cluster-local/*.sh
      # Form a real 3-node Raft cluster as separate processes, then prove a durable run created on the
      # leader survives KILLING the leader (re-election + replication). Exercises the production
      # start_raft path over real sockets — the coverage the in-process tests can't give.
      - name: Start cluster + failover test
        run: |
          ops/cluster-local/run-cluster.sh
          ops/cluster-local/failover-test.sh
      - name: Stop cluster
        if: always()
        run: ops/cluster-local/stop-cluster.sh || true
      - name: Node logs on failure
        if: failure()
        run: tail -n 100 /tmp/ecphoria-cluster/node-*/server.log 2>/dev/null || true

  cluster-sharded:
    name: "Cluster sharded (2 groups: routing + isolation)"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ecphoria-server
          path: target/release
      - run: chmod +x target/release/ecphoria-server ops/cluster-local/*.sh
      # Form TWO independent Raft groups (2 shards × 3 replicas) as separate processes and prove the
      # three multi-Raft properties the single-group test can't: each shard elects its own leader,
      # a tenant written via one shard's gateway is readable via the other (cross-shard reverse-proxy
      # routing), and killing one shard's leader leaves the other shard untouched (failover isolation).
      - name: Start sharded cluster + routing/isolation test
        env:
          SHARDS: "2"
          REPLICAS: "3"
        run: |
          ops/cluster-local/run-sharded.sh
          ops/cluster-local/sharding-test.sh
      - name: Stop cluster
        if: always()
        run: RUN_DIR=/tmp/ecphoria-sharded ops/cluster-local/stop-cluster.sh || true
      - name: Node logs on failure
        if: failure()
        run: tail -n 100 /tmp/ecphoria-sharded/shard-*/server.log 2>/dev/null || true
