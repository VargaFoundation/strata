name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Top-level is least-privilege; jobs that sign/attest widen their own scope below.
permissions:
  contents: read

jobs:
  docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # cosign keyless (GitHub OIDC) + provenance attestation
      attestations: write # actions/attest-build-provenance
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: sigstore/cosign-installer@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keyless signature (Sigstore/Fulcio via GitHub OIDC) over the pushed image by digest.
      - name: Sign image with cosign
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      # SLSA build provenance attestation, attached to the image in GHCR.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # SBOM (SPDX JSON) generated from the image and attached as a signed cosign attestation.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: ecphoria-sbom.spdx.json

      - name: Attest SBOM with cosign
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign attest --yes --predicate ecphoria-sbom.spdx.json --type spdxjson "${IMAGE}@${DIGEST}"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecphoria-sbom
          path: ecphoria-sbom.spdx.json

  operator-docker:
    name: Build & Push operator image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: sigstore/cosign-installer@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/ecphoria-operator
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v7
        id: build
        with:
          context: ops/operator
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Sign operator image with cosign
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/ecphoria-operator
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
      - name: Attest operator build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/ecphoria-operator
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write # create the GitHub Release + upload assets
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          pip install git-cliff || cargo install git-cliff
          git cliff --latest --strip header > RELEASE_NOTES.md

      # Attach the image SBOM produced by the docker job to the GitHub Release.
      - name: Download SBOM
        uses: actions/download-artifact@v4
        with:
          name: ecphoria-sbom
        continue-on-error: true

      - uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            ecphoria-sbom.spdx.json

  publish-python:
    name: Publish Python SDK (PyPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        working-directory: sdk/python
        env:
          # Add a PyPI API token as the repo secret PYPI_API_TOKEN to enable publishing.
          TWINE_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$TWINE_TOKEN" ]; then
            echo "PYPI_API_TOKEN not set — skipping PyPI publish."; exit 0
          fi
          python -m pip install --upgrade twine
          python -m twine upload dist/* -u __token__ -p "$TWINE_TOKEN"

  publish-npm:
    name: Publish TypeScript SDK (npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Install deps (builds via prepublishOnly on publish)
        working-directory: sdk/typescript
        run: npm install
      - name: Publish to npm
        working-directory: sdk/typescript
        env:
          # Add an npm automation token as the repo secret NPM_TOKEN to enable publishing.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not set — skipping npm publish."; exit 0
          fi
          npm publish --access public

  # The Go SDK (module github.com/VargaFoundation/ecphoria/sdk/go) is pull-based: `go get` resolves it
  # from the pushed tag via the Go module proxy / pkg.go.dev — no publish step needed.
