name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          pip install git-cliff || cargo install git-cliff
          git cliff --latest --strip header > RELEASE_NOTES.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md

  publish-python:
    name: Publish Python SDK (PyPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        working-directory: sdk/python
        env:
          # Add a PyPI API token as the repo secret PYPI_API_TOKEN to enable publishing.
          TWINE_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$TWINE_TOKEN" ]; then
            echo "PYPI_API_TOKEN not set — skipping PyPI publish."; exit 0
          fi
          python -m pip install --upgrade twine
          python -m twine upload dist/* -u __token__ -p "$TWINE_TOKEN"

  publish-npm:
    name: Publish TypeScript SDK (npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Install deps (builds via prepublishOnly on publish)
        working-directory: sdk/typescript
        run: npm install
      - name: Publish to npm
        working-directory: sdk/typescript
        env:
          # Add an npm automation token as the repo secret NPM_TOKEN to enable publishing.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not set — skipping npm publish."; exit 0
          fi
          npm publish --access public

  # The Go SDK (module github.com/VargaFoundation/strata/sdk/go) is pull-based: `go get` resolves it
  # from the pushed tag via the Go module proxy / pkg.go.dev — no publish step needed.
