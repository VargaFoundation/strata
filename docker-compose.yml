services:
  ecphoria:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5432:5432"
      - "8432:8432"
    environment:
      # Containers must bind all interfaces for port mapping to work…
      ECPHORIA_GATEWAY__LISTEN: 0.0.0.0:8432
      ECPHORIA_GATEWAY__PG_LISTEN: 0.0.0.0:5432
      ECPHORIA_GATEWAY__GRPC_LISTEN: 0.0.0.0:9432
      # …so authentication is mandatory (the server refuses to start otherwise).
      # Generate a key first:  export ECPHORIA_API_KEY=$(openssl rand -hex 32)
      ECPHORIA_GATEWAY__AUTH_ENABLED: "true"
      ECPHORIA_GATEWAY__API_KEYS: "${ECPHORIA_API_KEY:?ECPHORIA_API_KEY is required - generate one with openssl rand -hex 32}"
      ECPHORIA_STORAGE__DATA_DIR: /data
      ECPHORIA_STORAGE__ENGINE: s3
      ECPHORIA_STORAGE__S3__ENDPOINT: http://minio:9000
      ECPHORIA_STORAGE__S3__BUCKET: ecphoria
      ECPHORIA_STORAGE__S3__ACCESS_KEY: minioadmin
      ECPHORIA_STORAGE__S3__SECRET_KEY: minioadmin
      ECPHORIA_EMBEDDING__PROVIDER: ollama
      ECPHORIA_EMBEDDING__MODEL: nomic-embed-text
      ECPHORIA_EMBEDDING__OLLAMA_URL: http://ollama:11434
    volumes:
      - ecphoria-data:/data
    depends_on:
      minio:
        condition: service_healthy
      ollama:
        condition: service_started

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/ecphoria --ignore-existing;
      exit 0;
      "

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ecphoria-data:
  minio-data:
  ollama-data:
